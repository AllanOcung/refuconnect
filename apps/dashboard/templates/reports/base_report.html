<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @page {
      size: A4;
      margin: 18mm;
      @bottom-center { content: "Page " counter(page) " of " counter(pages); }
    }
    body { font-family: Arial, sans-serif; color: #1f2933; font-size: 11px; }
    h1 { color: #264653; font-size: 22px; margin: 0 0 4px; }
    h2 { color: #2a6f62; font-size: 15px; margin-top: 20px; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0 14px; }
    th, td { border: 1px solid #d7dee8; padding: 6px; text-align: left; }
    th { background: #264653; color: white; }
    .meta { color: #65758b; margin-bottom: 12px; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .metric { border: 1px solid #d7dee8; padding: 8px; background: #f7fafc; }
    .metric strong { display: block; font-size: 18px; color: #264653; }
    .watermark {
      position: fixed; top: 45%; left: 10%; transform: rotate(-30deg);
      color: rgba(38, 70, 83, 0.08); font-size: 64px; font-weight: bold;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="watermark">CONFIDENTIAL</div>
  <h1>{{ title }}</h1>
  <div class="meta">{{ organisation_name }} | Generated {{ generated_at|date:"Y-m-d H:i" }} UTC</div>
  {% block content %}{% endblock %}
</body>
</html>
