
x-django-env: &django-env
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.development
    AT_SKIP_SMS_SIGNATURE: "True"
    AFROLID_SERVICE_URL: http://afrolid:8000
    HUGGINGFACE_CACHE_DIR: /app/models/huggingface

x-django-image: &django-image refuconnect-django:local

services:
  db:
    image: postgres:13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: refuconnect
      POSTGRES_USER: refuconnect
      POSTGRES_PASSWORD: refuconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U refuconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: runtime
    image: *django-image
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      AT_SKIP_SMS_SIGNATURE: "True"
      AFROLID_SERVICE_URL: http://afrolid:8000
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile -"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    image: *django-image
    restart: unless-stopped
    <<: *django-env
    command: celery -A config.celery worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    image: *django-image
    restart: unless-stopped
    <<: *django-env
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  afrolid:
    build:
      context: ./services/afrolid_service
    restart: unless-stopped
    env_file: .env
    environment:
      - AFROLID_MODEL_PATH=/app/models/afrolid
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
